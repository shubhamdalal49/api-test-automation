name: API Automation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Maven Build (includes tests)
        run: mvn clean install

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/cucumber-reports.html
            target/SparkReport/Spark.html
            target/cucumber-html-reports/

      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Test Report - ${{ job.status }}"
          to: shubhamdalal0884@gmail.com
          from: "Automation Bot <${{ secrets.MAIL_USERNAME }}>"
          body: "Automation test run is complete. Please check the attached report."
          attachments: |
            target/cucumber-reports.html
            target/SparkReport/Spark.html
