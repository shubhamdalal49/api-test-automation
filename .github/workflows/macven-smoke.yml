name: Smoke Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:    # Allows manual run from GitHub Actions UI

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build code
        run: mvn clean install

      - name: Run Smoke Tests (@smoke tag)
        run: mvn test -Dcucumber.filter.tags="@smoke"

      - name: Upload Smoke HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-html-report
          path: |
            target/cucumber-reports.html
            target/SparkReport/Spark.html
            target/cucumber-html-reports/
